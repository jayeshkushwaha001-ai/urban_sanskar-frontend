<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Urban Wear</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .success-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #111111;
            margin-bottom: 10px;
        }
        p {
            font-size: 15px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .home-btn {
            display: inline-block;
            background-color: #111111;
            color: #ffffff;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 60px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }
        .home-btn:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">🎉</div>
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for shopping with us. Your payment has been securely verified, and your order details have been saved in our system.</p>
        <a href="index.html" class="home-btn">Continue Shopping</a>
    </div>

</body>
</html>
